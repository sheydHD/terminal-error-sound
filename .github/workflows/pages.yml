name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; cancel in-progress runs on new push.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    name: Build & deploy docs site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Jekyll config
        run: |
          cat > _config.yml <<'EOF'
          title: Terminal Error Sound 🔊
          description: >-
            A VS Code extension that plays an audible alert whenever a terminal
            command exits with a non-zero exit code.
          theme: minima
          url: "https://sheydHD.github.io"
          baseurl: "/terminal-error-sound"
          author:
            name: Antoni Dudij
            email: antonidudij@gmail.com
          github_username: sheydHD
          show_excerpts: true
          minima:
            skin: dark
          EOF

      - name: Prepare index page from README
        run: |
          printf -- '---\nlayout: home\ntitle: Home\n---\n\n' | cat - README.md > index.md

      # peaceiris/actions-gh-pages pushes the built site to the gh-pages branch.
      # This works on first run without any manual Pages setup in repo settings.
      # GitHub automatically serves the gh-pages branch at the Pages URL.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,node_modules,out,src,.vscode,.vscode-test,*.vsix,package-lock.json,tsconfig.json,.eslintrc.json,.gitignore,.vscodeignore'
          enable_jekyll: true
